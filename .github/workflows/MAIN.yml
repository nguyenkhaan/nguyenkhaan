name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *" # Chạy mỗi 6 tiếng
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SỬA TẠI ĐÂY: Dùng bản v3 thay vì @master
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: nguyenkhaan
          outputs: |
            dist/github-contribution-grid-snake-dark-custom.svg?color_snake=#FFDE42&color_dots=#EAEFEF,#89D4FF,#44ACFF,#261CC1,#0D1A63
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif

      # Bỏ bước "Push changes" cũ vì nó gây rác nhánh main
      # Dùng duy nhất bước này để đẩy ảnh vào nhánh 'output'
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
